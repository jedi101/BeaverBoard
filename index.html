<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="description" content="Hoppers BeaverBoard - Emoji Soundboard">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hoppers BeaverBoard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ff;--surface:#ffffff;--surface2:#f0eeff;--surface3:#e8e5fc;
  --border:rgba(100,90,200,0.12);--border2:rgba(100,90,200,0.22);
  --accent:#6c5ce7;--accent2:#5046c8;
  --text:#1a1740;--text2:#5a5490;--text3:#9490b8;
  --danger:#d63031;--success:#00b894;
  --r:16px;--rs:10px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(108,92,231,0.08) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(108,92,231,0.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(244,242,255,0.92);backdrop-filter:blur(12px);z-index:100}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo span{-webkit-text-fill-color:var(--text);background:none}
.hdr-right{display:flex;align-items:center;gap:8px}
.vi{display:flex;align-items:center;gap:6px;padding:5px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);transition:all .2s;min-width:0;max-width:160px;overflow:hidden}
.vi.speaking{border-color:var(--accent);color:var(--accent2);background:rgba(108,92,231,0.1)}
.vdot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all .2s;flex-shrink:0}
.vi.speaking .vdot{background:var(--accent);animation:pdot .6s infinite alternate}
@keyframes pdot{from{transform:scale(1);opacity:1}to{transform:scale(1.5);opacity:.6}}
#vlbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gear{width:40px;height:40px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:18px;flex-shrink:0}
.gear:hover,.gear:active{border-color:var(--accent);color:var(--accent2);transform:rotate(70deg)}
main{flex:1;padding:20px}
.glabel{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:14px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px}
.sb{aspect-ratio:1;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .15s cubic-bezier(.34,1.56,.64,1);user-select:none;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.sb:hover{border-color:var(--accent);transform:translateY(-2px) scale(1.03);box-shadow:0 8px 24px rgba(108,92,231,0.18)}
.sb:active{transform:scale(.92)}
.sb.playing{border-color:var(--accent);background:rgba(108,92,231,.1);animation:pfl .35s ease-out}
@keyframes pfl{0%{box-shadow:0 0 0 0 rgba(108,92,231,.6)}100%{box-shadow:0 0 0 20px rgba(108,92,231,0)}}
.se{font-size:40px;line-height:1;pointer-events:none}
.sl{font-size:10px;color:var(--text3);text-align:center;pointer-events:none;font-weight:500;padding:0 4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);gap:10px;text-align:center}
.empty .big{font-size:48px}.empty .et{font-size:15px;color:var(--text2);font-weight:600}
.ov{position:fixed;inset:0;background:rgba(30,20,80,.35);backdrop-filter:blur(10px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex;animation:fdin .2s ease}
@keyframes fdin{from{opacity:0}to{opacity:1}}
.sp{width:100%;max-width:540px;max-height:90vh;background:var(--surface);border-radius:26px 26px 0 0;border-top:2px solid var(--border2);display:flex;flex-direction:column;overflow:hidden;animation:sup .28s cubic-bezier(.34,1.3,.64,1);box-shadow:0 -8px 40px rgba(108,92,231,0.15)}
@media(min-width:600px){.ov{align-items:center}.sp{border-radius:26px;max-height:85vh}}
@keyframes sup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.ph{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pt{font-size:16px;font-weight:700}
.xbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.xbtn:hover{background:var(--danger);border-color:var(--danger);color:#fff}
.pb{padding:16px 20px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.stitle{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:10px}
.vs{background:var(--surface2);border-radius:var(--rs);border:1px solid var(--border);padding:13px;margin-bottom:20px;display:flex;flex-direction:column;gap:10px}
.vr{display:flex;align-items:center;gap:10px}
.vr label{font-size:13px;color:var(--text2);flex-shrink:0;min-width:72px}
select{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:7px 10px;font-size:12px;font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;max-width:200px;outline:none}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:4px}
.rv{font-size:12px;color:var(--accent2);min-width:30px;text-align:right}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-bottom:12px}
.slot{aspect-ratio:1;border-radius:var(--rs);border:2px dashed var(--border2);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent}
.slot:hover{border-color:var(--accent);background:rgba(108,92,231,.08)}
.slot .sle{font-size:26px;line-height:1}
.slot.filled{border-style:solid;border-color:var(--border)}
.slot .rx{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;cursor:pointer;font-weight:700;z-index:5}
.slot.filled:hover .rx{opacity:1}
.addbtn{aspect-ratio:1;border-radius:var(--rs);border:2px dashed var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:24px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.addbtn:hover{border-color:var(--success);color:var(--success)}
.ep{background:var(--surface2);border-radius:var(--rs);border:1px solid var(--border2);padding:12px;margin-bottom:12px;display:none}
.ep.open{display:block}
.psrow{display:flex;gap:7px;margin-bottom:9px}
.ps{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:8px 11px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;min-width:0}
.ps:focus{border-color:var(--accent)}
.ec{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.cb{padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.cb.active,.cb:hover{background:rgba(108,92,231,.12);border-color:var(--accent);color:var(--accent2)}
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(36px,1fr));gap:3px;max-height:160px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.eo{aspect-ratio:1;border-radius:7px;border:none;background:transparent;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.eo:hover,.eo:active{background:rgba(108,92,231,.15);transform:scale(1.15)}
.no-results{text-align:center;padding:20px;color:var(--text3);font-size:13px;grid-column:1/-1}
.ucbox{margin-top:10px;background:var(--surface3);border-radius:var(--rs);border:1px solid var(--border);padding:10px 12px}
.uclabel{font-size:11px;color:var(--text3);margin-bottom:7px;letter-spacing:0.5px}
.ucrow{display:flex;gap:7px;align-items:center}
.ucinput{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:8px 10px;font-size:13px;font-family:monospace;outline:none;transition:border-color .2s;min-width:0;letter-spacing:0.5px}
.ucinput::placeholder{font-family:system-ui;font-size:12px;letter-spacing:0}
.ucinput:focus{border-color:var(--accent)}
.ucinput.err{border-color:var(--danger)}
.ucinput.ok{border-color:var(--success)}
.ucpreview{font-size:24px;min-width:32px;text-align:center;flex-shrink:0;line-height:1}
.ucbtn{padding:8px 13px;border-radius:var(--rs);border:1px solid var(--accent);background:rgba(108,92,231,.12);color:var(--accent2);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;flex-shrink:0}
.ucbtn:hover{background:rgba(108,92,231,.22)}
.ucbtn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.uchint{font-size:11px;color:var(--text3);margin-top:5px}
.pf{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.bsave{flex:1;padding:12px;border-radius:var(--rs);border:none;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.bsave:hover{filter:brightness(1.1);transform:translateY(-1px)}
.bsave:active{transform:translateY(0)}
.breset{padding:12px 16px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.breset:hover{border-color:var(--danger);color:var(--danger)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);border:1px solid var(--accent2);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:400;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Hoppers <span>BeaverBoard</span></div>
    <div class="hdr-right">
      <div class="vi" id="vi"><div class="vdot"></div><span id="vlbl">Bereit</span></div>
      <button class="gear" id="gearBtn">&#9881;</button>
    </div>
  </header>
  <main>
    <div class="glabel">Soundboard</div>
    <div id="grid"></div>
  </main>
</div>

<div class="ov" id="overlay">
  <div class="sp">
    <div class="ph">
      <div class="pt">&#9881; Einstellungen</div>
      <button class="xbtn" id="closeBtn">&#x2715;</button>
    </div>
    <div class="pb">
      <div class="stitle">Stimme</div>
      <div class="vs">
        <div class="vr"><label>Stimme</label><select id="vsel"></select></div>
        <div class="vr"><label>Tempo</label><input type="range" id="rrate" min="0.5" max="2" step="0.1" value="1"><span class="rv" id="rratev">1.0</span></div>
        <div class="vr"><label>Tonh&#246;he</label><input type="range" id="rpitch" min="0.5" max="2" step="0.1" value="1"><span class="rv" id="rpitchv">1.0</span></div>
        <div class="vr"><label>Lautst&#228;rke</label><input type="range" id="rvol" min="0" max="1" step="0.05" value="1"><span class="rv" id="rvolv">1.0</span></div>
      </div>
      <div class="stitle">Emojis im Soundboard</div>
      <div class="sg" id="sg"></div>
      <div class="ep" id="ep">
        <div class="psrow">
          <input class="ps" id="psearch" placeholder="&#128269; Suchen auf Deutsch (z.B. Biber, Pizza, Herz)&#8230;" autocomplete="off">
        </div>
        <div class="ec" id="ec"></div>
        <div class="eg" id="eg"></div>
        <div class="ucbox">
          <div class="uclabel">&#128203; Emoji einfügen oder Unicode-Code eingeben</div>
          <div class="ucrow">
            <input class="ucinput" id="ucinput" placeholder="Emoji einf&#252;gen &#10084; oder U+1F9AB" maxlength="20" autocomplete="off" spellcheck="false">
            <span class="ucpreview" id="ucpreview">&#8203;</span>
            <button class="ucbtn" id="ucbtn" disabled>Hinzuf&#252;gen</button>
          </div>
          <div class="uchint">Emoji direkt einf&#252;gen (&#10084;&#65039; &#128514; &#129467;) &#8212; oder Unicode: U+1F9AB &#8226; 1F9AB &#8226; 0x1F9AB</div>
        </div>
      </div>
    </div>
    <div class="pf">
      <button class="breset" id="resetBtn">Zur&#252;cksetzen</button>
      <button class="bsave" id="saveBtn">Speichern &#10003;</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

  var eg=document.getElementById('eg');eg.innerHTML='';
  var cps=searchQ?searchEmojis(searchQ):getCatEmojis(activeCat);
  if(!cps.length){eg.innerHTML='<div class="no-results">Nicht gefunden &mdash; Unicode-Eingabe verwenden &#8595;</div>';return;}
  cps.forEach(function(cp){
    var emoji=getEmoji(cp);var btn=document.createElement('button');btn.className='eo';btn.textContent=emoji;btn.title=(CP_NAME[cp]||'');
    function doSel(e){if(e&&e.cancelable&&e.type==='touchstart')e.preventDefault();selectEmoji(emoji);}
    btn.addEventListener('click',doSel);btn.addEventListener('touchstart',doSel,{passive:false});eg.appendChild(btn);
  });
}
function selectEmoji(emoji){
  if(currentSlot===-1){config.emojis.push(emoji);}
  else if(currentSlot!==null&&currentSlot>=0){config.emojis[currentSlot]=emoji;}
  document.getElementById('ep').classList.remove('open');currentSlot=null;renderSlots();renderGrid();showToast('Emoji gesetzt \u2713');
}
function parseUC(val){
  val=val.trim();
  if(!val)return null;
  // Direct emoji paste: if the value contains non-ASCII codepoints > 0xFF, treat as emoji
  var cp0=val.codePointAt(0);
  if(cp0>0xFF){
    // Return the first full emoji sequence (base char + optional variation/ZWJ followers)
    var chars=[];var i=0;
    while(i<val.length){var c=val.codePointAt(i);chars.push(c);i+=c>0xFFFF?2:1;}
    // Build back from codepoints, keep ZWJ sequences and variation selectors
    try{return String.fromCodePoint.apply(null,chars);}catch(e){return null;}
  }
  // Unicode codepoint input: U+1F9AB, 1F9AB, 0x1F9AB
  var hex=val.toUpperCase().replace(/^U\+/,'').replace(/^0X/,'').replace(/\s/g,'');
  if(!/^[0-9A-F]{1,6}$/.test(hex))return null;
  var cp=parseInt(hex,16);
  if(cp<0x20||cp>0x10FFFF)return null;
  try{return String.fromCodePoint(cp);}catch(e){return null;}
}
function resetUC(){var inp=document.getElementById('ucinput');inp.value='';inp.className='ucinput';document.getElementById('ucpreview').textContent='\u200b';document.getElementById('ucbtn').disabled=true;}
document.getElementById('ucinput').addEventListener('input',function(){
  var emoji=parseUC(this.value);var prev=document.getElementById('ucpreview');var btn=document.getElementById('ucbtn');
  if(!this.value.trim()){this.className='ucinput';prev.textContent='\u200b';btn.disabled=true;}
  else if(emoji){this.className='ucinput ok';prev.textContent=emoji;btn.disabled=false;}
  else{this.className='ucinput err';prev.textContent='?';btn.disabled=true;}
});
document.getElementById('ucbtn').addEventListener('click',function(){var e=parseUC(document.getElementById('ucinput').value);if(e){selectEmoji(e);resetUC();}});
document.getElementById('ucinput').addEventListener('keydown',function(e){if(e.key==='Enter'){var em=parseUC(this.value);if(em){selectEmoji(em);resetUC();}}});
function populateVoices(){
  var sel=document.getElementById('vsel');sel.innerHTML='';
  var sorted=voices.slice().sort(function(a,b){var ag=a.lang.indexOf('de')===0?0:(a.lang.indexOf('en')===0?1:2);var bg=b.lang.indexOf('de')===0?0:(b.lang.indexOf('en')===0?1:2);return ag-bg;});
  if(!sorted.length){var o=document.createElement('option');o.value='';o.textContent='Standard';sel.appendChild(o);return;}
  sorted.forEach(function(v){var o=document.createElement('option');o.value=v.name;o.textContent=v.name+' ('+v.lang+')';if(v.name===config.voiceName)o.selected=true;sel.appendChild(o);});
  if(!config.voiceName&&sorted.length){var best=null;for(var i=0;i<sorted.length;i++){if(sorted[i].lang.indexOf('de')===0){best=sorted[i];break;}}if(!best)best=sorted[0];sel.value=best.name;config.voiceName=best.name;}
}
function syncRanges(){
  document.getElementById('rrate').value=config.rate;document.getElementById('rpitch').value=config.pitch;document.getElementById('rvol').value=config.volume;
  document.getElementById('rratev').textContent=parseFloat(config.rate).toFixed(1);document.getElementById('rpitchv').textContent=parseFloat(config.pitch).toFixed(1);document.getElementById('rvolv').textContent=parseFloat(config.volume).toFixed(2);
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
document.getElementById('psearch').addEventListener('input',function(){renderEmojiGrid(this.value.trim());});
document.getElementById('gearBtn').addEventListener('click',openSettings);
document.getElementById('closeBtn').addEventListener('click',closeSettings);
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===document.getElementById('overlay'))closeSettings();});
document.getElementById('saveBtn').addEventListener('click',function(){config.voiceName=document.getElementById('vsel').value;saveConfig();closeSettings();renderGrid();showToast('Gespeichert \u2713');});
document.getElementById('resetBtn').addEventListener('click',function(){if(confirm('Alle Einstellungen zur\u00fccksetzen?')){config={emojis:['\uD83E\uDDAB','\uD83E\uDEB5','\u2764','\uD83E\uDD54','\uD83D\uDE00','\uD83D\uDE02','\uD83D\uDE0D','\uD83E\uDD29','\uD83D\uDE0E','\uD83E\uDD73','\uD83D\uDE2D','\uD83E\uDD2F'],voiceName:'',rate:1,pitch:1,volume:1};saveConfig();renderSlots();renderGrid();populateVoices();syncRanges();showToast('Zur\u00fcckgesetzt');}});
document.getElementById('rrate').addEventListener('input',function(){config.rate=parseFloat(this.value);document.getElementById('rratev').textContent=config.rate.toFixed(1);});
document.getElementById('rpitch').addEventListener('input',function(){config.pitch=parseFloat(this.value);document.getElementById('rpitchv').textContent=config.pitch.toFixed(1);});
document.getElementById('rvol').addEventListener('input',function(){config.volume=parseFloat(this.value);document.getElementById('rvolv').textContent=config.volume.toFixed(2);});
function initVoices(){if(!window.speechSynthesis)return;voices=window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){voices=window.speechSynthesis.getVoices();};}
loadConfig();renderGrid();initVoices();
</script>
